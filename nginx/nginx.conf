server {
    listen 80;
    server_name quickpoll.local;

    location / {
        proxy_pass http://quickpoll_ui:3000;
        
        # Enable complete WebSocket protocols fallback mapping for Vite live update engines
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

server {
    listen 80;
    server_name api.quickpoll.local;

    location / {
        # 'api' matches the name of our Node service in docker-compose
        proxy_pass http://api:5000; 
        proxy_http_version 1.1;
        
        # Crucial for later: These headers allow WebSockets (Socket.io) to pass through Nginx
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /socket.io/ {
        proxy_pass http://api:5000;

        # 🌟 2. Critical protocol upgrade headers
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # 🌟 3. Forward real client connection metadata
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 🌟 4. Prevent Nginx from closing idle connections too early
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
